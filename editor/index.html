<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Brazilianite - Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="auth-bar">
    <div class="auth-bar-inner">
        <div style="display:flex;align-items:center;gap:8px">
            <button class="mobile-menu-btn" id="menu-toggle" aria-label="Toggle menu">&#9776;</button>
            <span class="auth-logo">Brazilianite Editor</span>
        </div>
        <div class="auth-right">
            <div id="auth-status"></div>
            <span id="branch-info" class="branch-info" style="display:none"></span>
            <div id="pending-changes" style="display:none">
                <span id="changes-count" class="changes-badge">0 changes</span>
                <button class="btn btn-primary btn-sm" onclick="openPRModal()">Submit PR</button>
            </div>
            <button class="btn btn-sm" id="auth-btn" onclick="openAuthModal()">Sign in with GitHub</button>
        </div>
    </div>
</div>
<div class="app">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            Brazilianite<br>
            <small>Data Editor</small>
        </div>
        <div class="nav-section">Browse</div>
        <div class="nav-item active" data-page="maps">
            <span class="nav-icon">&#9873;</span> Areas
        </div>
        <div class="nav-item" data-page="npcs">
            <span class="nav-icon">&#9786;</span> NPCs
        </div>
        <div class="nav-item" data-page="starters">
            <span class="nav-icon">&#9884;</span> Starters
        </div>
        <div class="nav-section">Data</div>
        <div class="nav-item" data-page="pokemon">
            <span class="nav-icon">&#9733;</span> Pokemon
        </div>
        <div class="nav-item" data-page="moves">
            <span class="nav-icon">&#10038;</span> Moves
        </div>
        <div class="nav-item" data-page="abilities">
            <span class="nav-icon">&#10024;</span> Abilities
        </div>
        <div class="nav-item" data-page="config">
            <span class="nav-icon">&#9881;</span> Config
            <span class="nav-badge" id="badge-config">-</span>
        </div>
        <div class="nav-section">Audio</div>
        <div class="nav-item" data-page="music">
            <span class="nav-icon">&#9835;</span> Music
            <span class="nav-badge" id="badge-music">-</span>
        </div>
        <div class="nav-section">Overview</div>
        <div class="nav-item" data-page="dashboard">
            <span class="nav-icon">&#9671;</span> Dashboard
        </div>
        <div class="nav-section">Tools</div>
        <div class="nav-item" data-page="sprite-creator">
            <span class="nav-icon">&#9998;</span> Sprite Creator
        </div>
        <a href="./playtest/" class="nav-item" style="text-decoration:none; color:inherit;">
            <span class="nav-icon">&#9654;</span> Playtest ROM
        </a>
    </aside>
    <!-- Global Music Player Bar -->
    <div class="music-player-bar" id="music-player-bar" style="display:none">
        <div class="music-player-info">
            <span class="music-player-icon">&#9835;</span>
            <span class="music-player-title" id="music-player-title">No track</span>
        </div>
        <div class="music-player-controls">
            <button class="btn btn-sm" id="music-player-play" onclick="window.musicPlayer.toggle()">&#9654;</button>
            <button class="btn btn-sm" id="music-player-stop" onclick="window.musicPlayer.stop()">&#9632;</button>
        </div>
    </div>
    <main class="main" id="content">
        <div class="loading-center"><div class="spinner"></div> Loading...</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.0.16/browser/midiplayer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<script src="app.js"></script>
</body>
</html>
