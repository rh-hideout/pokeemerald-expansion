<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Brazilianite - Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="auth-bar">
    <div class="auth-bar-inner">
        <span class="auth-logo">Brazilianite Editor</span>
        <div class="auth-right">
            <div id="auth-status"></div>
            <div id="pending-changes" style="display:none">
                <span id="changes-count" class="changes-badge">0 changes</span>
                <button class="btn btn-primary btn-sm" onclick="openPRModal()">Submit PR</button>
            </div>
            <button class="btn btn-sm" id="auth-btn" onclick="openAuthModal()">Sign in with GitHub</button>
        </div>
    </div>
</div>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-logo">
            Brazilianite<br>
            <small>Data Editor</small>
        </div>
        <div class="nav-section">Browse</div>
        <div class="nav-item active" data-page="maps">
            <span class="nav-icon">&#9873;</span> Areas
        </div>
        <div class="nav-section">Data</div>
        <div class="nav-item" data-page="moves">
            <span class="nav-icon">&#10038;</span> Moves
        </div>
        <div class="nav-item" data-page="abilities">
            <span class="nav-icon">&#10024;</span> Abilities
        </div>
        <div class="nav-item" data-page="config">
            <span class="nav-icon">&#9881;</span> Config
            <span class="nav-badge" id="badge-config">-</span>
        </div>
        <div class="nav-section">Overview</div>
        <div class="nav-item" data-page="dashboard">
            <span class="nav-icon">&#9671;</span> Dashboard
        </div>
        <div class="nav-section">Tools</div>
        <a href="./playtest/" class="nav-item" style="text-decoration:none; color:inherit;">
            <span class="nav-icon">&#9654;</span> Playtest ROM
        </a>
    </aside>
    <main class="main" id="content">
        <div class="loading-center"><div class="spinner"></div> Loading...</div>
    </main>
</div>
<script src="app.js"></script>
</body>
</html>
