<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Brazilianite - Data Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="sidebar-logo">
            Brazilianite<br>
            <small>Data Manager</small>
        </div>
        <div class="nav-section">Overview</div>
        <div class="nav-item active" data-page="dashboard">
            <span class="nav-icon">&#9671;</span> Dashboard
        </div>
        <div class="nav-section">Editable Data</div>
        <div class="nav-item" data-page="trainers">
            <span class="nav-icon">&#9876;</span> Trainers
            <span class="nav-badge" id="badge-trainers">-</span>
        </div>
        <div class="nav-item" data-page="encounters">
            <span class="nav-icon">&#9733;</span> Wild Encounters
            <span class="nav-badge" id="badge-encounters">-</span>
        </div>
        <div class="nav-item" data-page="maps">
            <span class="nav-icon">&#9873;</span> Routes / Maps
            <span class="nav-badge" id="badge-maps">-</span>
        </div>
        <div class="nav-item" data-page="moves">
            <span class="nav-icon">&#10038;</span> Moves
        </div>
        <div class="nav-item" data-page="items">
            <span class="nav-icon">&#9830;</span> Items
        </div>
        <div class="nav-item" data-page="abilities">
            <span class="nav-icon">&#10024;</span> Abilities
        </div>
        <div class="nav-section">Audio</div>
        <div class="nav-item" data-page="music">
            <span class="nav-icon">&#9835;</span> Music
            <span class="nav-badge" id="badge-music">-</span>
        </div>
        <div class="nav-item" data-page="config">
            <span class="nav-icon">&#9881;</span> Config
            <span class="nav-badge" id="badge-config">-</span>
        </div>
    </aside>
    <!-- Global Music Player Bar -->
    <div class="music-player-bar" id="music-player-bar" style="display:none">
        <div class="music-player-info">
            <span class="music-player-icon">&#9835;</span>
            <span class="music-player-title" id="music-player-title">No track</span>
        </div>
        <div class="music-player-controls">
            <button class="btn btn-sm" id="music-player-play" onclick="window.musicPlayer.toggle()">&#9654;</button>
            <button class="btn btn-sm" id="music-player-stop" onclick="window.musicPlayer.stop()">&#9632;</button>
        </div>
    </div>
    <main class="main" id="content">
        <div class="loading-center"><div class="spinner"></div> Loading...</div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.0.16/browser/midiplayer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<script src="app.js"></script>
</body>
</html>
