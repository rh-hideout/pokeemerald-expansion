name: CI

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/workflows/docs.yml'
      - '.github/workflows/labels.yml'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GAME_REVISION: 0
  GAME_LANGUAGE: ENGLISH
  COMPARE: 0
  UNUSED_ERROR: 1
  DEPRECATED_ERROR: 1

jobs:
  detect-changes:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    outputs:
      rom: ${{ steps.filter.outputs.rom }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rom:
              - 'src/**'
              - 'asm/**'
              - 'data/**'
              - 'graphics/**'
              - 'sound/**'
              - 'include/**'
              - 'tools/**'
              - 'Makefile'
              - 'make_tools.mk'
              - '*.mk'
              - 'ld_script*'
              - 'config.mk'
              - 'gflib/**'
              - 'test/**'
              - 'common_syms/**'
              - 'sym_*'

  build-debug:
    needs: detect-changes
    if: github.actor != 'allcontributors[bot]' && needs.detect-changes.outputs.rom == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install binutils
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi libpng-dev python3

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            tools/bin2c/bin2c
            tools/gbafix/gbafix
            tools/gbagfx/gbagfx
            tools/jsonproc/jsonproc
            tools/mapjson/mapjson
            tools/mid2agb/mid2agb
            tools/preproc/preproc
            tools/ramscrgen/ramscrgen
            tools/rsfont/rsfont
            tools/scaninc/scaninc
            tools/trainerproc/trainerproc
            tools/compresSmol/compresSmol
            tools/compresSmol/compresSmolTilemap
            tools/wav2agb/wav2agb
          key: tools-${{ runner.os }}-${{ hashFiles('tools/*/Makefile', 'tools/**/*.c', 'tools/**/*.cpp', 'tools/**/*.h') }}

      - name: ROM (Emerald) Debug
        env:
          GAME_VERSION: EMERALD
        run: make -j$(nproc) -O all

      - name: Upload debug ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokeemerald-debug
          path: pokeemerald.gba
          retention-days: 30

  build-release:
    needs: detect-changes
    if: github.actor != 'allcontributors[bot]' && needs.detect-changes.outputs.rom == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install binutils
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi libpng-dev python3

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            tools/bin2c/bin2c
            tools/gbafix/gbafix
            tools/gbagfx/gbagfx
            tools/jsonproc/jsonproc
            tools/mapjson/mapjson
            tools/mid2agb/mid2agb
            tools/preproc/preproc
            tools/ramscrgen/ramscrgen
            tools/rsfont/rsfont
            tools/scaninc/scaninc
            tools/trainerproc/trainerproc
            tools/compresSmol/compresSmol
            tools/compresSmol/compresSmolTilemap
            tools/wav2agb/wav2agb
          key: tools-${{ runner.os }}-${{ hashFiles('tools/*/Makefile', 'tools/**/*.c', 'tools/**/*.cpp', 'tools/**/*.h') }}

      - name: ROM (Emerald) Release
        env:
          GAME_VERSION: EMERALD
        run: make -j$(nproc) release

      - name: Upload release ROM
        uses: actions/upload-artifact@v4
        with:
          name: pokeemerald-release
          path: pokeemerald.gba
          retention-days: 30

  test:
    needs: detect-changes
    if: github.actor != 'allcontributors[bot]' && needs.detect-changes.outputs.rom == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install binutils
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-arm-none-eabi gcc-arm-none-eabi libnewlib-arm-none-eabi libpng-dev python3

      - name: Cache build tools
        uses: actions/cache@v4
        with:
          path: |
            tools/bin2c/bin2c
            tools/gbafix/gbafix
            tools/gbagfx/gbagfx
            tools/jsonproc/jsonproc
            tools/mapjson/mapjson
            tools/mid2agb/mid2agb
            tools/preproc/preproc
            tools/ramscrgen/ramscrgen
            tools/rsfont/rsfont
            tools/scaninc/scaninc
            tools/trainerproc/trainerproc
            tools/compresSmol/compresSmol
            tools/compresSmol/compresSmolTilemap
            tools/wav2agb/wav2agb
            tools/patchelf/patchelf
            tools/mgba-rom-test-hydra/mgba-rom-test-hydra
          key: tools-check-${{ runner.os }}-${{ hashFiles('tools/*/Makefile', 'tools/**/*.c', 'tools/**/*.cpp', 'tools/**/*.h') }}

      - name: Test
        env:
          GAME_VERSION: EMERALD
          TEST: 1
        run: make -j$(nproc) check

  # Gate job: satisfies the "build" branch protection rule.
  # Passes when ROM jobs succeed or are skipped (no ROM file changes).
  build:
    if: always() && github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    needs: [detect-changes, build-debug, build-release, test]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build-debug.result }}" == "failure" || "${{ needs.build-release.result }}" == "failure" || "${{ needs.test.result }}" == "failure" ]]; then
            echo "One or more ROM jobs failed."
            exit 1
          fi
          echo "All required checks passed."

  docs_validate:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            Makefile
            docs
            .github/docs_validate
          sparse-checkout-cone-mode: false

      - name: Check that SUMMARY.md includes markdown doc files
        run: .github/docs_validate/inclusive_summary.py

  allcontributors:
    if: github.actor == 'allcontributors[bot]'
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Automatically pass for allcontributors
        run: echo "CI automatically passes for allcontributors" && exit 0
