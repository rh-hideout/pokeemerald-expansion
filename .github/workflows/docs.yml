name: Deploy Pages

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'editor/**'
      - 'data/layouts/**'
      - 'data/tilesets/**'
      - 'data/maps/**'
      - 'tools/generate_map_previews.py'
      - '.github/workflows/docs.yml'

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install latest mdbook
        run: |
          tag="v0.5.1"
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir mdbook
          curl -sSL $url | tar -xz --directory=./mdbook
          echo `pwd`/mdbook >> $GITHUB_PATH

      - name: Build docs
        run: |
          cd docs
          mdbook build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate map previews
        run: |
          pip install Pillow
          python3 tools/generate_map_previews.py --force

      - name: Assemble Pages output
        run: |
          mkdir -p _site/docs _site/previews
          # Editor app at the root
          cp editor/index.html editor/app.js editor/style.css _site/
          # Map preview images
          cp editor/previews/*.png _site/previews/
          # mdbook docs under /docs/
          cp -r docs/book/* _site/docs/
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
